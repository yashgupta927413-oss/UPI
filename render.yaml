services:
  # 1. Main UPI Gateway Node.js Web Service
  - type: web
    name: upi-payment-gateway
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: upi-gateway-db
          property: connectionString

# 2. Managed PostgreSQL Database Instance
databases:
  - name: upi-gateway-db
    plan: free
